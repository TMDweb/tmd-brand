<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>TMD · RTL Agenda slide</title>
<link rel="stylesheet" href="../slides.css">
<style>
  body { background: #f0f2f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .ag { padding: 0; position: relative; direction: rtl; }

  .ag .title-block { position: absolute; top: 56px; right: 80px; }
  .ag .title-block .title { font-size: 37px; font-weight: 700; color: #fff; margin: 0; }   /* 28pt */

  .ag .page-num { position: absolute; top: 36px; left: 48px; right: auto; font-size: 16px; color: #f0f2f9; }

  .ag .items {
    position: absolute;
    top: 140px;
    right: 80px;
    left: 360px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .item { display: flex; align-items: stretch; gap: 14px; height: 50px; }
  .item .box {
    width: 50px;
    height: 50px;
    background: #fcbf2c;
    color: #0C0E1D;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 22px; flex-shrink: 0;
    box-sizing: border-box;
  }
  .item .bar {
    flex: 1;
    height: 50px;
    border: 1px dashed rgba(252,191,44,0.55);
    display: flex; align-items: center;
    padding: 0 18px;
    color: #fcbf2c; font-size: 18px; font-weight: 700;
    box-sizing: border-box;
  }

  .ag .logo { position: absolute; bottom: 48px; left: 64px; right: auto; height: 110px; }
</style>
</head>
<body>
  <section data-screen-label="03 محتويات العرض" class="slide dark ag">
    <div class="page-num">2</div>
    <div class="title-block"><h1 class="title">محتويات العرض</h1></div>
    <div class="items">
      <div class="item"><span class="box">1</span><span class="bar">اكتب عنوان المحتوى هنا</span></div>
      <div class="item"><span class="box">2</span><span class="bar">اكتب عنوان المحتوى هنا</span></div>
      <div class="item"><span class="box">3</span><span class="bar">اكتب عنوان المحتوى هنا</span></div>
      <div class="item"><span class="box">4</span><span class="bar">اكتب عنوان المحتوى هنا</span></div>
      <div class="item"><span class="box">5</span><span class="bar">اكتب عنوان المحتوى هنا</span></div>
      <div class="item"><span class="box">6</span><span class="bar">اكتب عنوان المحتوى هنا</span></div>
      <div class="item"><span class="box">7</span><span class="bar">اكتب عنوان المحتوى هنا</span></div>
      <div class="item"><span class="box">8</span><span class="bar">اكتب عنوان المحتوى هنا</span></div>
    </div>
    <img class="logo" src="../assets/TMD-logo-white.svg" alt="TMD">
  </section>
</body>
</html>
