<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>TMD · RTL Photo grid</title>
<link rel="stylesheet" href="slides.css">
<style>
  body { background: #f0f2f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .pg .body {
    position: absolute; top: 180px; left: 64px; right: 64px; bottom: 80px;
    display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr;
    gap: 14px; direction: rtl;
  }
  .pg .cell {
    position: relative;
    background-size: cover; background-position: center;
    overflow: hidden;
  }
  .pg .cell img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .pg .cell .cap {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 12px 16px;
    background: linear-gradient(180deg, rgba(12,14,29,0) 0%, rgba(12,14,29,0.85) 100%);
    color: #fff; font-size: 14px; font-weight: 600;
    text-align: right;
  }
  .pg .cell .cap small { display: block; font-size: 11px; font-weight: 500; color: #fcbf2c; margin-bottom: 2px; }
</style>
</head>
<body>
  <section data-screen-label="17 شبكة صور" class="slide light pg rtl">
    <div class="page-num">17</div>
    <div class="header">
      <div class="title">سنة على الأرض</div>
      <div class="subtitle">ست لحظات من اثني عشر شهر تشغيل</div>
    </div>
    <div class="body">
      <div class="cell"><img src="../assets/photos/meeting-1.jpg" alt=""><div class="cap"><small>الرياض</small>المراجعة الفصلية مع الشريك</div></div>
      <div class="cell"><img src="../assets/photos/planing.jpg" alt=""><div class="cap"><small>جدة</small>ورشة الاستراتيجية، اليوم الأول</div></div>
      <div class="cell"><img src="../assets/photos/handshake.jpg" alt=""><div class="cap"><small>توقيع</small>تجديد السنة الثانية</div></div>
      <div class="cell"><img src="../assets/photos/flag-man.jpg" alt=""><div class="cap"><small>اليوم الوطني</small>حملة العلامة عبر المملكة</div></div>
      <div class="cell"><img src="../assets/photos/meeting-2.jpg" alt=""><div class="cap"><small>ميدان</small>تهيئة الفريق، الأسبوع الأول</div></div>
      <div class="cell"><img src="../assets/photos/ula-1.jpg" alt=""><div class="cap"><small>العلا</small>تصوير تراثي، اليوم الثالث</div></div>
    </div>
  </section>
</body>
</html>
