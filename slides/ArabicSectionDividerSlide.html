<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>TMD · RTL Section divider</title>
<link rel="stylesheet" href="slides.css">
<style>
  body { background: #f0f2f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  .sd { padding: 0; position: relative; direction: rtl; }

  .sd .page-num { position: absolute; top: 36px; left: 48px; right: auto; font-size: 18px; color: #f0f2f9; }

  .sd .bignum {
    position: absolute;
    right: 64px;
    left: auto;
    top: 50%;
    transform: translateY(-50%);
    font-size: 360px;
    font-weight: 800;
    line-height: 0.8;
    color: #11152A;
    user-select: none;
    z-index: 1;
  }
  .sd .content {
    position: absolute;
    right: 410px;
    left: auto;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    max-width: 740px;
    text-align: right;
  }
  .sd .kicker { font-size: 28px; font-weight: 400; color: #fff; margin: 0 0 10px 0; }
  .sd .name { font-size: 64px; font-weight: 700; line-height: 1.15; color: #fff; margin: 0; }
</style>
</head>
<body>
  <section data-screen-label="02 فاصل قسم" class="slide dark sd">
    <div class="page-num">5</div>
    <div class="bignum">01</div>
    <div class="content">
      <p class="kicker">عنوان القسم</p>
      <h2 class="name">عنوان الجزئية أو الشرائح القادمة</h2>
    </div>
  </section>
</body>
</html>
