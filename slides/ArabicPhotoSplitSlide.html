<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>TMD · RTL Photo split</title>
<link rel="stylesheet" href="slides.css">
<style>
  body { background: #f0f2f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .ps-split { background: #fff; }
  /* Mirror: image on the right (RTL leading edge), panel on the left */
  .ps-split .image {
    position: absolute; right: 0; top: 0; bottom: 0; width: 50%;
    overflow: hidden;
  }
  .ps-split .image img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .ps-split .panel {
    position: absolute; left: 0; top: 0; bottom: 0; right: 56%;
    padding: 80px 0 80px 64px;
    display: flex; flex-direction: column; justify-content: center; gap: 18px;
    text-align: right;
  }
  .ps-split .panel .tag { font-size: 14px; font-weight: 700; color: #29366C; }
  .ps-split .panel h2 { margin: 0; font-size: 36px; font-weight: 700; color: #0C0E1D; line-height: 1.25; max-width: 460px; }
  .ps-split .panel p { margin: 0; font-size: 16px; line-height: 1.8; color: #0C0E1D; max-width: 460px; }
  .ps-split .panel .stat {
    display: flex; align-items: baseline; gap: 12px; margin-top: 14px;
    padding-top: 16px; border-top: 4px solid #fcbf2c; width: fit-content;
  }
  .ps-split .panel .stat .n { font-size: 56px; font-weight: 700; color: #0C0E1D; direction: ltr; }
  .ps-split .panel .stat .l { font-size: 14px; color: #29366C; font-weight: 600; max-width: 200px; line-height: 1.5; }

  .ps-split .page-num { color: #2f3e75; }
</style>
</head>
<body>
  <section data-screen-label="16 صورة مقسومة" class="slide light ps-split rtl">
    <div class="image"><img src="../assets/photos/meeting-1.jpg" alt=""></div>
    <div class="page-num">16</div>
    <div class="panel">
      <span class="tag">دراسة حالة</span>
      <h2>موجز واحد، 12 أسبوع، فريق واحد</h2>
      <p>انتقل الشريك من خمسة موردين إلى فريق واحد مدمج. الموجزات التي كانت تأخذ ثلاثة أسابيع تنطلق الآن في سبعة أيام، والمراجعة القيادية تختصر في صفحة واحدة.</p>
      <div class="stat">
        <div class="n">3x</div>
        <div class="l">أسرع من الموجز للإطلاق مقارنة بالأساس السابق</div>
      </div>
    </div>
  </section>
</body>
</html>
