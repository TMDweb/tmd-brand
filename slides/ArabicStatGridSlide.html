<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>TMD · RTL Stat grid</title>
<link rel="stylesheet" href="slides.css">
<style>
  body { background: #f0f2f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.sg .body { position: absolute; top: 230px; left: 64px; right: 64px; bottom: 80px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 28px; direction: rtl; }
  .sg .cell {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    text-align: center;
  }

  .sg .ring { position: relative; width: 168px; height: 168px; }
  .sg .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .sg .ring .track { stroke: #f0f2f9; stroke-width: 8; fill: none; }
  .sg .ring .fill  { stroke: #29366C; stroke-width: 8; fill: none; stroke-linecap: butt; }
  .sg .cell.accent .ring .fill { stroke: #fcbf2c; }
  .sg .ring .pct {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-size: 44px; font-weight: 700; color: #0C0E1D; line-height: 1;
    direction: ltr;
  }
  .sg .ring .pct small { font-size: 0.55em; font-weight: 600; color: #29366C; margin-left: 2px; }
  .sg .cell.accent .ring .pct small { color: #fcbf2c; }

  .sg .cell h4 { margin: 0; font-size: 20px; font-weight: 700; color: #0C0E1D; }
  .sg .cell p { margin: 0; font-size: 14px; line-height: 1.7; color: #29366C; max-width: 220px; }
</style>
</head>
<body>
  <section data-screen-label="10 شبكة أرقام" class="slide light sg rtl">
    <div class="page-num">10</div>
    <div class="header">
      <div class="title">أين تقف الأرقام</div>
      <div class="subtitle">صورة عبر الشراكات النشطة</div>
    </div>

    <div class="body">
      <div class="cell">
        <div class="ring">
          <svg viewBox="0 0 168 168">
            <circle class="track" cx="84" cy="84" r="76"/>
            <circle class="fill"  cx="84" cy="84" r="76"
                    stroke-dasharray="477" stroke-dashoffset="405.45"/>
          </svg>
          <div class="pct">15<small>%</small></div>
        </div>
        <h4>تذكّر العلامة</h4>
        <p>دون تلميح، استبيان بعد الحملة، السوق المستهدف.</p>
      </div>

      <div class="cell accent">
        <div class="ring">
          <svg viewBox="0 0 168 168">
            <circle class="track" cx="84" cy="84" r="76"/>
            <circle class="fill"  cx="84" cy="84" r="76"
                    stroke-dasharray="477" stroke-dashoffset="119.25"/>
          </svg>
          <div class="pct">75<small>%</small></div>
        </div>
        <h4>ثبات الفريق</h4>
        <p>كفاءات الفريق الأصلية مستمرة عند الشهر 12.</p>
      </div>

      <div class="cell">
        <div class="ring">
          <svg viewBox="0 0 168 168">
            <circle class="track" cx="84" cy="84" r="76"/>
            <circle class="fill"  cx="84" cy="84" r="76"
                    stroke-dasharray="477" stroke-dashoffset="286.2"/>
          </svg>
          <div class="pct">40<small>%</small></div>
        </div>
        <h4>خفض التكلفة</h4>
        <p>مقارنة ببناء فريق داخلي مكافئ في السنة الأولى.</p>
      </div>

      <div class="cell">
        <div class="ring">
          <svg viewBox="0 0 168 168">
            <circle class="track" cx="84" cy="84" r="76"/>
            <circle class="fill"  cx="84" cy="84" r="76"
                    stroke-dasharray="477" stroke-dashoffset="190.8"/>
          </svg>
          <div class="pct">60<small>%</small></div>
        </div>
        <h4>أسرع إطلاق</h4>
        <p>من بداية الشراكة لأول إنتاج جاهز للسوق.</p>
      </div>
    </div>
  </section>
</body>
</html>
