<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>TMD · RTL Photo hero</title>
<link rel="stylesheet" href="slides.css">
<style>
  body { background: #f0f2f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .ph .photo { position: absolute; inset: 0; z-index: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
  .ph .veil {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg, rgba(12,14,29,0.35) 0%, rgba(12,14,29,0) 30%, rgba(12,14,29,0) 55%, rgba(12,14,29,0.85) 100%);
  }
  .ph .page-num { color: #fff; z-index: 3; }
  .ph .logo { position: absolute; top: 36px; right: 48px; left: auto; z-index: 3; height: 56px; width: auto; }
  .ph .header {
    position: absolute; bottom: 80px; right: 64px; left: 64px; top: auto;
    z-index: 2; max-width: 1100px;
  }
  .ph .header .title { color: #fff; font-size: 48px; line-height: 1.3; }
  .ph .header .subtitle { color: #fcbf2c; font-size: 22px; margin-top: 10px; }
</style>
</head>
<body>
  <section data-screen-label="15 صورة رئيسية" class="slide dark ph rtl">
    <img class="photo" src="../assets/photos/direyah.jpg" alt="">
    <img class="logo" src="../assets/TMD-logo-white.svg" alt="TMD">
    <div class="veil"></div>
    <div class="page-num">15</div>
    <div class="header">
      <div class="title">جذور في الرياض، أثر يمتدّ أبعد</div>
      <div class="subtitle">سنة من العمل عبر المملكة</div>
    </div>
  </section>
</body>
</html>
