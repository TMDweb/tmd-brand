<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>TMD · Photo grid</title>
<link rel="stylesheet" href="../slides.css">
<style>
  body { background: #f0f2f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

  /* PHOTO GRID — six cells, 3 columns × 2 rows */
  .pg .body {
    position: absolute; top: 180px; left: 64px; right: 64px; bottom: 80px;
    display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr;
    gap: 14px;
  }
  .pg .cell {
    position: relative;
    background-size: cover; background-position: center;
    overflow: hidden;
  }
  .pg .cell img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .pg .cell .cap {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 12px 16px;
    background: linear-gradient(180deg, rgba(12,14,29,0) 0%, rgba(12,14,29,0.85) 100%);
    color: #fff; font-size: 14px; font-weight: 600;
  }
  .pg .cell .cap small { display: block; font-size: 11px; font-weight: 500; color: #fcbf2c; margin-bottom: 2px; }
</style>
</head>
<body>
  <section data-screen-label="17 Photo grid" class="slide light pg">
    <div class="page-num">17</div>
    <div class="header">
      <div class="title">A year on the ground</div>
      <div class="subtitle">Six moments from twelve months of operate</div>
    </div>
    <div class="body">
      <div class="cell"><img src="../assets/photos/meeting-1.jpg" alt=""><div class="cap"><small>RIYADH</small>Quarterly partner review</div></div>
      <div class="cell"><img src="../assets/photos/planing.jpg" alt=""><div class="cap"><small>JEDDAH</small>Strategy intensive, day one</div></div>
      <div class="cell"><img src="../assets/photos/handshake.jpg" alt=""><div class="cap"><small>CONTRACT</small>Year two signed</div></div>
      <div class="cell"><img src="../assets/photos/flag-man.jpg" alt=""><div class="cap"><small>NATIONAL DAY</small>Brand campaign across the Kingdom</div></div>
      <div class="cell"><img src="../assets/photos/meeting-2.jpg" alt=""><div class="cap"><small>FIELD</small>Pod onboarding, week one</div></div>
      <div class="cell"><img src="../assets/photos/ula-1.jpg" alt=""><div class="cap"><small>AL ULA</small>Heritage shoot, day three</div></div>
    </div>
  </section>
</body>
</html>
